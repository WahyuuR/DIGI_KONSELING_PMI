<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <title>Admin - Ubah Akun</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="/css/sidebar.css" />
    <link rel="stylesheet" href="/css/bootstrap/bootstrap.min.css" />

    <!-- Boxicons CDN Link -->
    <link
      href="https://unpkg.com/boxicons@2.0.7/css/boxicons.min.css"
      rel="stylesheet"
    />

    <style>
      .data_table {
        background: #fff;
        padding: 15px;
        box-shadow: 1px 3px 5px #aaa;
        border-radius: 5px;
      }
    </style>
  </head>

  <body>
    <nav class="sidebar">
      <div class="logo-details">
        <i class="bx bxs-copyright icon"></i>
        <div class="logo_name">DIGI-CONSELING-PMI</div>
        <i class="bx bx-menu" id="btn"></i>
      </div>

      <ul class="nav-list">
        <li>
          <a href="/admin-data">
            <i class="bx bx-grid-alt"></i>
            <span class="links_name">Data</span>
          </a>
          <span class="tooltip">Data</span>
        </li>
        <li>
          <a href="/admin-layanan">
            <i class="bx bx-chat"></i>
            <span class="links_name">Edit Detail Layanan</span>
          </a>
          <span class="tooltip">Edit Detail Layanan</span>
        </li>
        <li>
          <a href="/admin-import">
            <i class="bx bx-upload"></i>
            <span class="links_name">Import</span>
          </a>
          <span class="tooltip">Import</span>
        </li>
        <li>
          <a href="/admin-gallery">
            <i class="bx bx-image"></i>
            <span class="links_name">Manajemen Foto</span>
          </a>
          <span class="tooltip">Manajemen Foto</span>
        </li>
        <li>
          <a href="/admin-credentials">
            <i class="bx bx-user"></i>
            <span class="links_name">Akun</span>
          </a>
          <span class="tooltip">Akun</span>
        </li>

        <li class="profile">
          <div class="profile-details">
            <img
              src="/images/NAVBARBRAND.png"
              alt="profile"
              style="object-fit: cover"
            />
            <div class="name_job">
              <div class="name">Admin</div>
              <div class="job">DIGI-KONSELING-PMI</div>
            </div>
          </div>
          <a
            id="log_out"
            href="/admin-logout"
            aria-label="Logout"
            style="text-decoration: none"
          >
            <i class="bx bx-log-out"></i>
          </a>
        </li>
      </ul>
    </nav>

    <section class="home-section">
      <div class="container mt-4 mb-5">
        <div class="data_table">
          <h5 class="mb-3">Ubah Username / Password Admin</h5>
          <div class="form-text mb-3">
            Jika database tidak tersedia, fitur ubah password mungkin tidak
            berfungsi.
          </div>

          <form id="credentialsForm">
            <div class="mb-3">
              <label class="form-label" for="currentPassword"
                >Password saat ini</label
              >
              <input
                class="form-control"
                type="password"
                id="currentPassword"
                name="currentPassword"
                required
              />
            </div>

            <div class="mb-3">
              <label class="form-label" for="newUsername"
                >Username baru</label
              >
              <input
                class="form-control"
                type="text"
                id="newUsername"
                name="newUsername"
                required
              />
            </div>

            <div class="mb-3">
              <label class="form-label" for="newPassword">Password baru</label>
              <input
                class="form-control"
                type="password"
                id="newPassword"
                name="newPassword"
                required
              />
            </div>

            <button class="btn btn-primary btn-sm" type="submit">Simpan</button>
          </form>
        </div>
      </div>
    </section>

    <script src="/js/sidebar.js"></script>
    <script>
      document
        .getElementById("credentialsForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const currentPassword = document.getElementById("currentPassword").value;
          const newUsername = document.getElementById("newUsername").value;
          const newPassword = document.getElementById("newPassword").value;

          const resp = await fetch("/admin-update-credentials", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              currentPassword,
              newUsername,
              newPassword,
            }),
            credentials: "same-origin",
          });

          if (resp.status === 401) {
            window.location.href = "/login";
            return;
          }

          const text = await resp.text();
          if (resp.ok) {
            alert("Username/password admin berhasil diubah.");
            window.location.href = "/admin-data";
            return;
          }

          alert(text || "Gagal menyimpan username/password.");
        });
    </script>
  </body>
</html>
