<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Konsultasi Kerja dan Pengaduan</title>
    <link rel="stylesheet" href="/css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/footer.css" />
    <style>
      .box-konselor {
        margin-top: 20px;
        margin-bottom: 50px;
      }
      .branding-header {
        padding: 15px 0;
        border-bottom: 1px solid #f0f0f0;
        margin-bottom: 30px;
      }
      .card-img-top {
        height: 500px; /* Diperpanjang agar tidak terpotong */
        object-fit: cover;
        object-position: top; /* Fokus pada wajah di bagian atas */
      }
      .section-title {
        position: relative;
        padding-bottom: 10px;
        margin-bottom: 30px;
        font-weight: 700;
        color: #333;
      }
      .section-title::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 60px;
        height: 3px;
        background: #0d6efd;
        border-radius: 3px;
      }
      @media (max-width: 768px) {
        .card-img-top {
          height: 350px;
        }
      }
    </style>
  </head>
  <body>

    <div class="container box-konselor">
      <!-- Tombol Kembali -->
      <div class="mb-4">
        <a href="/layanan.html" class="btn btn-light shadow-sm rounded-pill px-4">
          <i class="bx bx-left-arrow-alt"></i> Kembali ke Layanan
        </a>
      </div>

      <div class="text-center mb-5">
        <h2 class="fw-bold">Pusat Konsultasi & Pengaduan</h2>
        <div id="konselorDetail" class="alert alert-info border-0 shadow-sm rounded-4 mt-3" style="background: #e3f2fd;">
          Sedang memuat informasi...
        </div>
      </div>

      <!-- Baris 1: Konsultasi Kerja dan Pengaduan (3 Orang) -->
      <div class="mb-5">
        <h4 class="text-center section-title">Konsultasi Kerja dan Pengaduan</h4>
        <div class="row justify-content-center" id="row1">
          <!-- Dinamis via JS -->
        </div>
      </div>

      <!-- Baris 2: Konsultasi Pengaduan (2 Orang) -->
      <div>
        <h4 class="text-center section-title">Konsultasi Pengaduan</h4>
        <div class="row justify-content-center" id="row2">
          <!-- Dinamis via JS -->
        </div>
      </div>
    </div>

    <script>
      (async function () {
        try {
          const cfg = await fetch("/wa-config").then((r) => r.json());
          
          if (cfg.detail_konselor) {
            document.getElementById('konselorDetail').innerHTML = cfg.detail_konselor.replace(/\n/g, '<br>');
          }

          const row1 = document.getElementById('row1');
          const row2 = document.getElementById('row2');
          
          row1.innerHTML = '';
          row2.innerHTML = '';

          for (let i = 1; i <= 5; i++) {
            const name = cfg[`konselor_${i}_name`] || `Konselor ${i}`;
            const wa = cfg[`konselor_${i}_wa`] || "";
            const img = cfg[`konselor_${i}_img`] || "/images/Digikons.png";
            const serviceType = i <= 3 ? "Konsultasi Kerja & Pengaduan" : "Konsultasi Pengaduan";
            
            if (!wa) continue;

            const col = document.createElement('div');
            col.className = 'col-lg-4 col-md-6 mb-4';
            col.innerHTML = `
              <div class="card rounded-4 shadow-sm border-0 h-100">
                <img src="${img}" class="card-img-top rounded-top-4" alt="${name}" onerror="this.src='/images/Digikons.png'">
                <div class="card-body text-center d-flex flex-column">
                  <h5 class="card-title fw-bold mt-2 mb-1">${name}</h5>
                  <p class="text-primary small fw-bold mb-2">${serviceType}</p>
                  <p class="text-muted small mb-3">Silahkan hubungi kami pada jam kerja untuk bantuan profesional.</p>
                  <div class="mt-auto">
                    <a href="https://wa.me/${wa.replace(/\D/g, "")}" target="_blank" class="btn btn-primary rounded-pill px-4 w-100 shadow-sm">
                      <i class="bx bxl-whatsapp"></i> Hubungi Sekarang
                    </a>
                  </div>
                </div>
              </div>
            `;

            if (i <= 3) {
              row1.appendChild(col);
            } else {
              col.className = 'col-lg-4 col-md-6 mb-4'; // Tetap col-4 agar ukuran sama
              row2.appendChild(col);
            }
          }
        } catch (err) {
          console.error("Gagal memuat data konselor:", err);
          document.getElementById('konselorDetail').innerHTML = "Gagal memuat data layanan.";
        }
      })();
    </script>
    <script src="/js/bootstrap/bootstrap.min.js"></script>
  </body>
</html>
