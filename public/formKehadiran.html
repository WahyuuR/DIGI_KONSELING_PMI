<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Daftar Hadir | DIGI-KONSELING-PMI</title>
    <link rel="stylesheet" href="/css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/style.css" />
    <link href="https://unpkg.com/boxicons@2.0.7/css/boxicons.min.css" rel="stylesheet" />
    <style>
      .body-kehadiran {
        justify-content: center;
        align-items: center;
        padding: 20px;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }
    </style>
  </head>
  <body class="body-kehadiran">
    <!-- Form Kehadiran Tamu -->
    <div class="form-login-container" style="max-width: 600px;">
      <h3 class="text-center mb-4">Daftar Hadir Tamu</h3>
      <form action="/submit" method="post" id="formKehadiran">
        <div class="form-group mb-3">
          <label for="nama">Nama</label>
          <input
            type="text"
            class="form-control form-control-tabung"
            id="nama"
            name="nama"
            placeholder="Masukkan nama Anda"
            required
          />
        </div>
        <div class="form-group mb-3">
          <label for="no_telpon">No. Telpon</label>
          <input
            type="text"
            class="form-control form-control-tabung"
            id="no_telpon"
            name="no_telpon"
            placeholder="Masukkan No. Telpon Anda"
            required
          />
        </div>
        <div class="form-group mb-3">
          <label for="alamat">Alamat</label>
          <input
            type="text"
            class="form-control form-control-tabung"
            id="alamat"
            name="alamat"
            placeholder="Masukkan Alamat Rumah Anda"
            required
          />
        </div>
        <div class="form-group mb-4">
          <label for="jenis_keperluan">Jenis Keperluan</label>
          <select
            class="form-select form-control-tabung"
            id="jenis_keperluan"
            name="jenis_keperluan"
            required
          >
            <option value="" selected disabled>Pilih jenis keperluan...</option>
            <option value="Layanan Informasi">Layanan Informasi</option>
            <option value="Pengaduan">Pengaduan</option>
            <option value="Konsultasi">Konsultasi</option>
            <option value="Lainnya">Lainnya</option>
          </select>
        </div>
        <button type="submit" class="login-btn">Kirim Kehadiran</button>
      </form>
      <div class="text-center mt-4">
        <a href="/index.html" class="text-white text-decoration-none small opacity-75">
          <i class="bx bx-left-arrow-alt"></i> Kembali ke Home
        </a>
      </div>
    </div>

    <script src="/js/bootstrap/bootstrap.min.js"></script>
    <script>
      document
        .getElementById("formKehadiran")
        .addEventListener("submit", function (event) {
          event.preventDefault();

          const nama = document.getElementById("nama").value;
          const no_telpon = document.getElementById("no_telpon").value;
          const alamat = document.getElementById("alamat").value;
          const jenis_keperluan = document.getElementById("jenis_keperluan").value;

          if (nama && no_telpon && alamat && jenis_keperluan) {
            this.submit();
          } else {
            alert("Harap isi semua data!");
          }
        });
    </script>
  </body>
</html>
