<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login Admin | DIGI-KONSELING-PMI</title>
    <link rel="stylesheet" href="/css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/footer.css" />
    <link href="https://unpkg.com/boxicons@2.0.7/css/boxicons.min.css" rel="stylesheet" />
    <script src="/js/bootstrap/bootstrap.min.js"></script>
    <style>
      .body-login {
        justify-content: center;
        align-items: center;
        padding: 20px;
      }
      #footer {
        position: fixed;
        bottom: 0;
        width: 100%;
      }
    </style>
  </head>
  <body class="body-login">
    <!-- login -->
    <div class="form-login-container">
      <h3 class="text-center">Login Admin</h3>
      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            class="form-control form-control-tabung"
            id="username"
            name="username"
            placeholder="Masukkan username"
            required
          />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            class="form-control form-control-tabung"
            id="password"
            name="password"
            placeholder="Masukkan password"
            required
          />
        </div>
        <button class="login-btn" type="submit">Masuk ke Panel</button>
      </form>
      <div class="text-center mt-4">
        <a href="/index.html" class="text-white text-decoration-none small opacity-75">
          <i class="bx bx-left-arrow-alt"></i> Kembali ke Home
        </a>
      </div>
    </div>


    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", function (event) {
          event.preventDefault();

          const username = document.getElementById("username").value;
          const password = document.getElementById("password").value;

          fetch("/admin-login", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ username, password }),
            credentials: "same-origin",
          })
            .then(async (resp) => {
              if (resp.ok) {
                window.location.href = "/admin";
                return;
              }
              const text = await resp.text();
              alert(text || "Username atau password salah!");
            })
            .catch(() => {
              alert("Gagal menghubungi server untuk login.");
            });
        });
    </script>
  </body>
</html>
