<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FAQ - Tanya Jawab Interaktif</title>
    <link rel="stylesheet" href="/css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/footer.css" />
    <style>
      #chatbox {
        display: flex;
        gap: 20px;
        background: rgba(255, 255, 255, 0.9);
        padding: 20px;
        border-radius: 15px;
        margin-top: 40px;
        min-height: 450px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      }
      #questions {
        width: 35%;
        border-right: 1px solid #eee;
        padding-right: 20px;
        max-height: 600px;
        overflow-y: auto;
      }
      #answers {
        width: 65%;
        padding-left: 10px;
      }
      .chat-entry {
        padding: 12px 15px;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.3s ease;
        border: 1px solid transparent;
        font-weight: 500;
        font-size: 0.85rem;
        margin-bottom: 8px;
        background: #f8f9fa;
      }
      .chat-entry:hover {
        background: #f0f7ff;
        color: #0d6efd;
      }
      .chat-entry.active {
        background: #0d6efd;
        color: white;
        box-shadow: 0 4px 12px rgba(13, 110, 253, 0.3);
      }
      .box-faq {
        margin-top: 20px;
        margin-bottom: 50px;
      }
      .branding-header {
        padding: 15px 0;
        border-bottom: 1px solid #f0f0f0;
        margin-bottom: 30px;
      }
      @media (max-width: 768px) {
        #chatbox {
          flex-direction: column;
        }
        #questions, #answers {
          width: 100%;
          border: none;
          padding: 0;
        }
      }
    </style>
  </head>
  <body>

    <div class="container box-faq">
      <!-- Tombol Kembali -->
      <div class="mb-4">
        <a href="/layanan.html" class="btn btn-light shadow-sm rounded-pill px-4">
          <i class="bx bx-left-arrow-alt"></i> Kembali ke Layanan
        </a>
      </div>

      <div class="text-center mb-4">
        <h2 class="fw-bold">Tanya Jawab (FAQ)</h2>
        <p class="text-muted">Pusat Informasi dan Panduan Layanan Pekerja Migran Indonesia</p>
      </div>
      
      <div id="chatbox">
        <div id="questions" class="d-flex flex-column">
          <!-- Dinamis -->
        </div>
        <div id="answers" class="d-flex flex-column">
          <div class="text-center mt-5 text-muted">
            <i class="bx bx-chat fs-1 d-block mb-2"></i>
            Silahkan pilih topik pertanyaan di sebelah kiri.
          </div>
        </div>
      </div>
    </div>

    <script>
      async function loadFAQ() {
        try {
          const resp = await fetch("/wa-config");
          const cfg = await resp.json();
          
          let qa = {};
          try {
            qa = JSON.parse(cfg.qa_faq || "{}");
          } catch(e) { console.error("JSON parse error", e); }

          const questionsContainer = document.getElementById("questions");
          const answersContainer = document.getElementById("answers");

          questionsContainer.innerHTML = "";
          Object.keys(qa).forEach((q, index) => {
            const btn = document.createElement("div");
            btn.className = "chat-entry";
            btn.innerText = q;
            btn.onclick = () => {
              answersContainer.innerHTML = `<div class="animate__animated animate__fadeIn">
                <div class="card p-4 shadow-sm border-0 bg-light" style="border-radius: 15px; line-height: 1.6;">
                  <h5 class="fw-bold mb-3 text-primary">${q}</h5>
                  ${qa[q]}
                </div>
              </div>`;
              document.querySelectorAll(".chat-entry").forEach(b => b.classList.remove("active"));
              btn.classList.add("active");
            };
            questionsContainer.appendChild(btn);
            if (index === 0) btn.click();
          });
        } catch (err) {
          console.error("Gagal memuat FAQ:", err);
        }
      }
      document.addEventListener('DOMContentLoaded', loadFAQ);
    </script>
    <script src="/js/bootstrap/bootstrap.min.js"></script>
  </body>
</html>
