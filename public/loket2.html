<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loket 2 - BP2MI</title>
    <link rel="stylesheet" href="/css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/footer.css" />
    <style>
      #chatbox {
        display: flex;
        gap: 20px;
        background: rgba(255, 255, 255, 0.9);
        padding: 20px;
        border-radius: 15px;
        margin-top: 40px;
        min-height: 400px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      }
      #questions {
        width: 35%;
        border-right: 1px solid #eee;
        padding-right: 20px;
      }
      #answers {
        width: 65%;
        padding-left: 10px;
      }
      .chat-entry {
        padding: 12px 15px;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.3s ease;
        border: 1px solid transparent;
        font-weight: 500;
        font-size: 0.9rem;
      }
      .chat-entry:hover {
        background: #f0f7ff;
        color: #0d6efd;
      }
      .chat-entry.active {
        background: #0d6efd;
        color: white;
        box-shadow: 0 4px 12px rgba(13, 110, 253, 0.3);
      }
      .box-loket {
        margin-top: 40px;
        margin-bottom: 50px;
      }
      @media (max-width: 768px) {
        #chatbox {
          flex-direction: column;
        }
        #questions, #answers {
          width: 100%;
          border: none;
          padding: 0;
        }
        .box-loket {
          margin-top: 20px;
        }
      }
    </style>
  </head>
  <body>

    <div class="container box-loket">
      <!-- Tombol Kembali -->
      <div class="mb-4">
        <a href="/layanan.html" class="btn btn-light shadow-sm rounded-pill px-4">
          <i class="bx bx-left-arrow-alt"></i> Kembali ke Layanan
        </a>
      </div>

      <div class="text-center mb-4">
        <h2 class="fw-bold" id="loketTitle">Loket BP2MI Jatim</h2>
        <p class="text-muted">Pelayanan Pelindungan & Penempatan PMI</p>
      </div>
      
      <div id="chatbox">
        <div id="questions" class="d-flex flex-column">
          <!-- Pertanyaan akan diisi oleh JavaScript -->
        </div>
        <div id="answers" class="d-flex flex-column">
          <!-- Jawaban akan diisi oleh JavaScript -->
          <div class="text-center mt-5 text-muted">
            <i class="bx bx-mouse-alt fs-1 d-block mb-2"></i>
            Pilih pertanyaan di sebelah kiri untuk melihat detail prosedur.
          </div>
        </div>
      </div>
      
      <div class="text-center mt-5">
        <a id="waLink" href="#" class="btn btn-success btn-lg px-5 rounded-pill shadow-lg">
          <i class="bx bxl-whatsapp"></i> Hubungi Petugas via WhatsApp
        </a>
      </div>
    </div>

    <script>
      async function loadQA() {
        try {
          const resp = await fetch("/wa-config");
          const cfg = await resp.json();
          
          let qa = {};
          try {
            qa = JSON.parse(cfg.qa_bp2mi || "{}");
          } catch(e) { console.error("JSON parse error", e); }

          const questionsContainer = document.getElementById("questions");
          const answersContainer = document.getElementById("answers");
          const phone = cfg.loket2_bp2mi || "";
          const message = encodeURIComponent(cfg.waMessage || "Halo, saya ingin bertanya tentang layanan BP2MI.");

          questionsContainer.innerHTML = "";
          Object.keys(qa).forEach((q, index) => {
            const btn = document.createElement("div");
            btn.className = "chat-entry mb-2";
            btn.innerText = q;
            btn.onclick = () => {
              answersContainer.innerHTML = `<div class="animate__animated animate__fadeIn">
                <div class="card p-4 shadow-sm border-0 bg-light" style="border-radius: 15px;">
                  ${qa[q]}
                </div>
              </div>`;
              document.querySelectorAll(".chat-entry").forEach(b => b.classList.remove("active"));
              btn.classList.add("active");
            };
            questionsContainer.appendChild(btn);
            if (index === 0) btn.click();
          });

          if (phone) {
            const waBtn = document.getElementById('waLink');
            waBtn.href = `https://wa.me/${phone.replace(/\D/g, "")}?text=${message}`;
            waBtn.target = "_blank";
          } else {
            document.getElementById('waLink').style.display = 'none';
          }
        } catch (err) {
          console.error("Gagal memuat detail loket:", err);
        }
      }
      document.addEventListener('DOMContentLoaded', loadQA);
    </script>
    <script src="/js/bootstrap/bootstrap.min.js"></script>
  </body>
</html>
