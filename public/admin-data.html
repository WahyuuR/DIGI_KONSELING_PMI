<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <title>Admin - Data Daftar Hadir</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="/css/sidebar.css" />
    <link rel="stylesheet" href="/css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/datatables.min.css" />

    <!-- Boxicons CDN Link -->
    <link
      href="https://unpkg.com/boxicons@2.0.7/css/boxicons.min.css"
      rel="stylesheet"
    />

    <style>
      .data_table {
        background: #fff;
        padding: 15px;
        box-shadow: 1px 3px 5px #aaa;
        border-radius: 5px;
      }
      .data_table table {
        width: 100%;
        table-layout: fixed;
      }
    </style>
  </head>

  <body>
    <nav class="sidebar">
      <div class="logo-details">
        <i class="bx bxs-copyright icon"></i>
        <div class="logo_name">DIGI-CONSELING-PMI</div>
        <i class="bx bx-menu" id="btn"></i>
      </div>

      <ul class="nav-list">
        <li>
          <a href="/admin-data">
            <i class="bx bx-grid-alt"></i>
            <span class="links_name">Data</span>
          </a>
          <span class="tooltip">Data</span>
        </li>
        <li>
          <a href="/admin-layanan">
            <i class="bx bx-chat"></i>
            <span class="links_name">Edit Detail Layanan</span>
          </a>
          <span class="tooltip">Edit Detail Layanan</span>
        </li>
        <li>
          <a href="/admin-import">
            <i class="bx bx-upload"></i>
            <span class="links_name">Import</span>
          </a>
          <span class="tooltip">Import</span>
        </li>
        <li>
          <a href="/admin-gallery">
            <i class="bx bx-image"></i>
            <span class="links_name">Manajemen Foto</span>
          </a>
          <span class="tooltip">Manajemen Foto</span>
        </li>
        <li>
          <a href="/admin-credentials">
            <i class="bx bx-user"></i>
            <span class="links_name">Akun</span>
          </a>
          <span class="tooltip">Akun</span>
        </li>

        <li class="profile">
          <div class="profile-details">
            <img
              src="/images/NAVBARBRAND.png"
              alt="profile"
              style="object-fit: cover"
            />
            <div class="name_job">
              <div class="name">Admin</div>
              <div class="job">DIGI-KONSELING-PMI</div>
            </div>
          </div>
          <a
            id="log_out"
            href="/admin-logout"
            aria-label="Logout"
            style="text-decoration: none"
          >
            <i class="bx bx-log-out"></i>
          </a>
        </li>
      </ul>
    </nav>

    <section class="home-section">
      <div class="container mt-4 mb-5">
        <div class="data_table">
          <div class="row mb-2">
            <div class="col-md-8 show-dropdown">
              <h5>Data Daftar Hadir</h5>
            </div>
          </div>

          <div class="row mb-3 align-items-center">
            <div class="col-md-8 show-dropdown">
              <label>Show</label>
              <select id="rows-per-page" class="form-control">
                <option value="10">10</option>
                <option value="20">20</option>
                <option value="50">50</option>
                <option value="100">100</option>
                <option value="-1">All</option>
              </select>
              <label>entries</label>
            </div>
          </div>

          <table id="example" class="table table-striped table-bordered">
            <thead class="table-dark">
              <tr>
                <th>No</th>
                <th>Nama</th>
                <th>Nomer HP</th>
                <th>Alamat</th>
                <th>Jenis Keperluan</th>
                <th>Tanggal</th>
              </tr>
            </thead>
            <tbody id="table-body"></tbody>
          </table>
        </div>
      </div>
    </section>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="/js/bootstrap/bootstrap.min.js"></script>
    <script src="/js/datatables.min.js"></script>
    
    <!-- DataTables Buttons and dependencies -->
    <script src="https://cdn.datatables.net/buttons/1.7.1/js/dataTables.buttons.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.3/jszip.min.js"></script>
    <script src="/js/pdfmake.min.js"></script>
    <script src="/js/vfs_fonts.js"></script>
    <script src="https://cdn.datatables.net/buttons/1.7.1/js/buttons.html5.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/1.7.1/js/buttons.print.min.js"></script>
    <script src="/js/sidebar.js"></script>

    <script>
      $(document).ready(function () {
        const params = new URLSearchParams(window.location.search);
        if (params.get("importDb") === "unavailable") {
          const rows = params.get("rows") || "";
          alert(
            "Database tidak tersedia. Excel berhasil dibaca (" +
              rows +
              " baris), tetapi data tidak tersimpan."
          );
        }

        $.ajax({
          type: "GET",
          url: "/get-data",
          dataType: "json",
          success: function (data) {
            $("#table-body").empty();

            $.each(data, function (index, row) {
              const formattedDate = row.tanggal
                ? new Date(row.tanggal).toLocaleDateString("id-ID", {
                    year: "numeric",
                    month: "2-digit",
                    day: "2-digit",
                  })
                : "";

              $("#table-body").append(
                "<tr>" +
                  "<td>" +
                  (index + 1) +
                  "</td>" +
                  "<td>" +
                  (row.nama || "") +
                  "</td>" +
                  "<td>" +
                  (row.nomer_hp || "") +
                  "</td>" +
                  "<td>" +
                  (row.alamat || "") +
                  "</td>" +
                  "<td>" +
                  (row.jenis_keperluan || "") +
                  "</td>" +
                  "<td>" +
                  formattedDate +
                  "</td>" +
                  "</tr>"
              );
            });

            $("#example").DataTable({
              dom: "Bfrtip",
              buttons: [
                "copyHtml5",
                "excelHtml5",
                "csvHtml5",
                "pdfHtml5",
                "print",
              ],
              ordering: false,
            });

            $("#rows-per-page").on("change", function () {
              // DataTables API: update page length
              const table = $("#example").DataTable();
              table.page.len($(this).val()).draw();
            });
          },
          error: function (xhr) {
            if (xhr && xhr.status === 401) {
              window.location.href = "/login";
              return;
            }
            alert("Gagal mengambil data admin.");
          },
        });
      });
    </script>
  </body>
</html>
